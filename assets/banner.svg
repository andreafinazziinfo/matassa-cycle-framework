<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 280" width="100%" height="100%">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#070a13"/>
      <stop offset="50%" stop-color="#0b1122"/>
      <stop offset="100%" stop-color="#070a13"/>
    </linearGradient>
    <linearGradient id="wave-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0.1"/>
      <stop offset="50%" stop-color="#09F1B8" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#0ea5e9" stop-opacity="0.1"/>
    </linearGradient>
    <filter id="glow-teal" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#1e293b" stroke-width="0.7" stroke-opacity="0.6"/>
    </pattern>
  </defs>
  <style><![CDATA[
    .title-name { font-family: system-ui, sans-serif; font-weight: 800; fill: #fff; letter-spacing: 3px; }
    .subtitle-spec { font-family: 'Fira Code', monospace; font-weight: 600; fill: #09F1B8; letter-spacing: 2px; font-size: 11.5px; }
    .terminal-text { font-family: 'Fira Code', monospace; font-size: 10.5px; fill: #94a3b8; }
    .terminal-header { font-family: 'Fira Code', monospace; font-size: 9.5px; font-weight: bold; fill: #475569; }
    .cyan-txt { fill: #09F1B8; } .blue-txt { fill: #0ea5e9; } .purple-txt { fill: #8B5CF6; } .bright-txt { fill: #fff; }
    @keyframes pulse-cyan { 0%, 100% { fill: #09F1B8; } 50% { fill: #0d9488; } }
    .status-dot-cyan { animation: pulse-cyan 2s infinite; }
    @keyframes cursor-blink { 0%, 100% { opacity: 0; } 50% { opacity: 1; } }
    .term-cursor { animation: cursor-blink 1.2s step-end infinite; fill: #09F1B8; }
    @keyframes draw-wave { 0% { stroke-dashoffset: 2000; } 100% { stroke-dashoffset: 0; } }
    .animated-wave { stroke-dasharray: 2000; stroke-dashoffset: 2000; animation: draw-wave 8s linear infinite; }
  ]]></style>

  <rect width="848" height="278" x="1" y="1" rx="10" fill="url(#bg-grad)" stroke="#1e293b" stroke-width="1.5"/>
  <rect width="848" height="278" x="1" y="1" rx="10" fill="url(#grid)"/>

  <path d="M -50 180 C 100 120, 200 240, 350 170 C 500 100, 600 220, 750 160 C 850 120, 900 180, 950 180" fill="none" stroke="url(#wave-grad)" stroke-width="3" filter="url(#glow-soft)"/>
  <path id="wave-anim" class="animated-wave" d="M -50 180 C 100 120, 200 240, 350 170 C 500 100, 600 220, 750 160 C 850 120, 900 180, 950 180" fill="none" stroke="#0ea5e9" stroke-width="1.5" opacity="0.8">
    <animate attributeName="stroke-dashoffset" values="2000;0;2000" dur="8s" repeatCount="indefinite"/>
  </path>

  <g transform="translate(35, 45)">
    <rect width="360" height="190" rx="8" fill="#04060d" fill-opacity="0.85" stroke="#1e293b" stroke-width="1.2"/>
    <circle cx="20" cy="18" r="4.5" fill="#ef4444" opacity="0.85"/>
    <circle cx="34" cy="18" r="4.5" fill="#eab308" opacity="0.85"/>
    <circle cx="48" cy="18" r="4.5" fill="#22c55e" opacity="0.85"/>
    <text x="75" y="21" class="terminal-header">MATASSA://REFERENCE_TABLES</text>
    <path d="M 0 32 L 360 32" stroke="#1e293b" stroke-width="1"/>
    <g transform="translate(18, 38)">
      <text x="0" y="20" class="terminal-text"><tspan class="purple-txt">matassa@cycle</tspan>:<tspan class="blue-txt">~/tables</tspan>$ load m-1-0x.csv</text>
      <text x="0" y="42" class="terminal-text">[<tspan class="blue-txt">OK</tspan>] Profile M (1.0x) - 6 markets</text>
      <text x="0" y="62" class="terminal-text">[<tspan class="blue-txt">OK</tspan>] T-scale T .. T+10 harmonics</text>
      <text x="0" y="82" class="terminal-text">[<tspan class="purple-txt">INF</tspan>] Crypto 100% | Stock US 19.3%</text>
      <text x="0" y="102" class="terminal-text">[<tspan class="purple-txt">INF</tspan>] Pine: private | TV: invite-only</text>
      <text x="0" y="122" class="terminal-text">[<tspan class="blue-txt">SYS</tspan>] Public layer: CSV + XLSX</text>
      <text x="0" y="142" class="terminal-text"><tspan class="purple-txt">matassa@cycle</tspan>:<tspan class="blue-txt">~/tables</tspan>$ <tspan class="bright-txt">status</tspan><tspan class="term-cursor">&#9608;</tspan></text>
    </g>
  </g>

  <g transform="translate(435, 45)">
    <g transform="translate(200, 0)">
      <rect width="140" height="24" rx="12" fill="#0b1716" stroke="#09F1B8" stroke-opacity="0.3" stroke-width="1"/>
      <circle cx="16" cy="12" r="4.5" class="status-dot-cyan">
        <animate attributeName="opacity" values="1;0.35;1" dur="2s" repeatCount="indefinite"/>
      </circle>
      <text x="28" y="16" font-family="monospace" font-size="9" fill="#09F1B8" font-weight="bold">REFERENCE LIVE</text>
    </g>
    <text x="0" y="52" class="title-name" font-size="30" filter="url(#glow-teal)">MATASSA CYCLE</text>
    <text x="0" y="82" class="title-name" font-size="30" filter="url(#glow-teal)">FRAMEWORK</text>
    <text x="0" y="108" class="subtitle-spec">T-SCALE DURATIONS &amp; CALIBRATION</text>
    <g transform="translate(0, 120)">
      <rect width="115" height="32" rx="4" fill="#070c14" fill-opacity="0.8" stroke="#1e293b" stroke-width="0.8"/>
      <text x="12" y="20" font-family="system-ui,sans-serif" font-size="11" font-weight="900" fill="#09F1B8">MIN - M - MAX</text>
      <g transform="translate(125, 0)">
        <rect width="115" height="32" rx="4" fill="#070c14" fill-opacity="0.8" stroke="#1e293b" stroke-width="0.8"/>
        <text x="12" y="20" font-family="system-ui,sans-serif" font-size="11" font-weight="900" fill="#8B5CF6">T .. T+10</text>
      </g>
      <g transform="translate(250, 0)">
        <rect width="110" height="32" rx="4" fill="#070c14" fill-opacity="0.8" stroke="#1e293b" stroke-width="0.8"/>
        <text x="12" y="20" font-family="system-ui,sans-serif" font-size="11" fill="#94a3b8">@AnDr3HA TV</text>
      </g>
    </g>
  </g>
</svg>
