<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 4" width="100%" height="4">
  <defs>
    <linearGradient id="div-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#09F1B8" stop-opacity="0"/>
      <stop offset="15%" stop-color="#8B5CF6" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#09F1B8" stop-opacity="1"/>
      <stop offset="85%" stop-color="#8B5CF6" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#09F1B8" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <line x1="0" y1="2" x2="850" y2="2" stroke="url(#div-grad)" stroke-width="2" filter="url(#glow)"/>
</svg>
